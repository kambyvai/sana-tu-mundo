<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sana Tu Mundo Interior - Proceso Interactivo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:900px;width:95%;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden}
.login-screen{padding:60px 40px;text-align:center}
.login-screen h1{color:#667eea;font-size:2.5rem;margin-bottom:20px}
.login-screen p{color:#555;margin-bottom:30px;font-size:1.1rem}
.login-screen input{width:100%;max-width:300px;padding:15px;border:2px solid #ddd;border-radius:10px;font-size:1.1rem;margin-bottom:20px}
.login-screen button{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:15px 50px;border-radius:10px;font-size:1.1rem;cursor:pointer;transition:transform 0.2s}
.login-screen button:hover{transform:scale(1.05)}
.app-container{display:none}
.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:25px;color:white;text-align:center}
.header h1{font-size:1.8rem}
.main-content{display:flex;min-height:calc(100vh - 100px)}
.sidebar{width:280px;background:#f8f9fa;border-right:2px solid #e9ecef;padding:20px;overflow-y:auto}
.mod-item{padding:12px;margin-bottom:8px;cursor:pointer;border-radius:8px;font-size:0.9rem;transition:all 0.2s;border-left:4px solid transparent}
.mod-item:hover{background:#e9ecef}
.mod-item.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-left-color:#fff}
.mod-item.done{background:#d4edda;border-left-color:#28a745}
.mod-item.done::after{content:' ✓';float:right}
.content-area{flex:1;padding:40px;overflow-y:auto}
.module-content h2{color:#667eea;font-size:2rem;margin-bottom:25px}
.module-content p{line-height:1.8;margin-bottom:20px;color:#333}
.module-content ul,.module-content ol{margin-left:25px;margin-bottom:20px}
.module-content li{margin-bottom:10px;line-height:1.6}
.ejercicio{background:#f8f9fa;padding:25px;border-radius:12px;margin:25px 0;border-left:5px solid #667eea}
.ejercicio h3{color:#667eea;margin-bottom:15px}
.ejercicio textarea{width:100%;min-height:120px;padding:15px;border:2px solid #ddd;border-radius:8px;font-size:1rem;font-family:inherit;resize:vertical}
.scale-group{margin:20px 0}
.scale-btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.scale-btn{padding:10px 20px;border:2px solid #ddd;background:white;border-radius:8px;cursor:pointer;transition:all 0.2s}
.scale-btn:hover{border-color:#667eea;background:#f0f4ff}
.scale-btn.sel{background:#667eea;color:white;border-color:#667eea}
.nav-btns{display:flex;gap:15px;justify-content:space-between;align-items:center;margin-top:30px}
.btn-prev{padding:12px 25px;background:#fff;color:#667eea;border:2px solid #667eea;border-radius:10px;cursor:pointer;font-size:1rem;transition:all 0.2s}
.btn-prev:hover{background:#667eea;color:white}
.btn-next{padding:12px 30px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;cursor:pointer;font-size:1rem;transition:all 0.2s}
.btn-next:hover{transform:scale(1.02)}
.btn-next:disabled{background:#ccc;cursor:not-allowed;transform:none}
.btn-hint{font-size:0.85rem;color:#dc3545;text-align:center;margin-top:10px;font-style:italic}
.completado-badge{background:linear-gradient(135deg,#28a745,#20c997);color:white;padding:20px;border-radius:12px;text-align:center;margin:25px 0}
.completado-badge h3{font-size:1.3rem;margin-bottom:8px}
.final-badge{background:linear-gradient(135deg,#ffd700,#ffed4e);padding:40px;border-radius:15px;text-align:center;margin-top:30px}
.final-badge h2{font-size:2.2rem;color:#333;margin-bottom:15px}
.final-badge p{font-size:1.2rem;color:#555}
</style>
</head>
<body>
<div class="container">
<div class="login-screen" id="loginScreen">
<h1>🌟 Sana Tu Mundo Interior</h1>
<p>Proceso interactivo de sanación y transformación personal</p>
<input type="text" id="codeInput" placeholder="Ingresa tu código de acceso" />
<button onclick="checkCode()">Comenzar</button>
</div>
<div class="app-container" id="appContainer">
<div class="header">
<h1>Sana Tu Mundo Interior - Tu Viaje de Transformación</h1>
</div>
<div class="main-content">
<div class="sidebar" id="sidebar"></div>
<div class="content-area" id="content"></div>
</div>
</div>
</div>
<script>
const CODE='STM2024';
const S={cur:0,ans:{},scales:{},done:[]};
const MODS=[
{id:'inicio',title:'Bienvenida al Viaje'},
{id:'m1',title:'Módulo 1: El Socavón'},
{id:'m2',title:'Módulo 2: Las Máscaras'},
{id:'m3',title:'Módulo 3: La Sombra'},
{id:'m4',title:'Módulo 4: El Niño Interior'},
{id:'m5',title:'Módulo 5: Creencias Limitantes'},
{id:'m6',title:'Módulo 6: Las Heridas'},
{id:'m7',title:'Módulo 7: El Perdón'},
{id:'m8',title:'Módulo 8: La Gratitud'},
{id:'m9',title:'Módulo 9: Tu Nuevo Yo'},
{id:'m10',title:'Módulo 10: El Plan de Acción'},
{id:'final',title:'¡Completado!'}
];
function checkCode(){
const v=document.getElementById('codeInput').value.trim();
if(v===CODE){
document.getElementById('loginScreen').style.display='none';
document.getElementById('appContainer').style.display='block';
loadApp();
}else{alert('Código incorrecto. Intenta de nuevo.');}
}
function loadApp(){
renderSidebar();
showMod(S.cur);
}
function renderSidebar(){
let h='';
MODS.forEach((m,i)=>{
const cls=['mod-item'];
if(i===S.cur)cls.push('active');
if(S.done.includes(i))cls.push('done');
h+=`<div class="${cls.join(' ')}" onclick="showMod(${i})">${m.title}</div>`;
});
document.getElementById('sidebar').innerHTML=h;
}
function showMod(i){
S.cur=i;
renderSidebar();
const m=MODS[i];
document.getElementById('content').innerHTML=getContent(i);
restoreAnswers(i);
checkNextBtn(i);
window.scrollTo(0,0);
}
function saveAns(key,val){
S.ans[key]=val;
checkNextBtn(S.cur);
}
function saveScale(g,v){
S.scales[g]=v;
document.querySelectorAll(`.scale-btn[data-g="${g}"]`).forEach(b=>b.classList.remove('sel'));
const btn=document.querySelector(`.scale-btn[data-g="${g}"][data-v="${v}"]`);
if(btn)btn.classList.add('sel');
}
function checkNextBtn(i){
const m=MODS[i];
const btn=document.getElementById('btnNext');
const hint=document.getElementById('btnHint');
if(!btn)return;
if(m.id==='inicio'||S.done.includes(i)){
btn.disabled=false;
if(hint)hint.style.display='none';
return;
}
const mainKey=`${m.id}_main`;
const val=(S.ans[mainKey]||'').trim();
const ok=val.length>=10;
btn.disabled=!ok;
if(hint)hint.style.display=ok?'none':'block';
}
function restoreAnswers(i){
const m=MODS[i];
Object.keys(S.ans).forEach(key=>{
if(key.startsWith(m.id)){
const el=document.getElementById(key);
if(el)el.value=S.ans[key];
}
});
Object.keys(S.scales).forEach(g=>{
if(g.startsWith(m.id)){
const btn=document.querySelector(`.scale-btn[data-g="${g}"][data-v="${S.scales[g]}"]`);
if(btn)btn.classList.add('sel');
}
});
}
function goPrev(i){
if(i>0)showMod(i-1);
}
function goNext(i){
if(!S.done.includes(i)){
S.done.push(i);
showDoneBadge();
}
if(i<MODS.length-1){
setTimeout(()=>showMod(i+1),1500);
}
}
function showDoneBadge(){
const b=document.getElementById('doneBadge');
if(b){
b.style.display='block';
setTimeout(()=>b.style.display='none',1200);
}
}
function navBtns(i){
return`<div class="nav-btns"><button class="btn-prev" onclick="goPrev(${i})">${i>0?'← Anterior':''}</button><button class="btn-next" id="btnNext" onclick="goNext(${i})">Completar y continuar →</button></div><p class="btn-hint" id="btnHint" style="display:none">✏️ Escribe en el ejercicio de abajo para continuar</p>`;
}
function doneBadge(){
return`<div class="completado-badge" id="doneBadge" style="display:none"><h3>✅ ¡Completado!</h3><p>Tu respuesta se guardó. Avanzas en tu proceso.</p></div>`;
}
function getContent(i){
const m=MODS[i];
if(i===0){
return`<div class="module-content"><h2>🌟 Bienvenido a Tu Viaje de Sanación Interior</h2>
<p>Este es un espacio sagrado para ti. Un lugar donde podrás explorar tu mundo interior, sanar heridas del pasado, y construir una vida más plena y auténtica.</p>
<p><strong>¿Qué encontrarás en este proceso?</strong></p>
<ul>
<li>10 módulos de trabajo profundo sobre tu sanación emocional</li>
<li>Ejercicios prácticos que te ayudarán a conectar con tu verdad</li>
<li>Historias reales de transformación que te inspirarán</li>
<li>Un espacio para escribir, reflexionar y crear tu nuevo camino</li>
</ul>
<p><strong>Cómo funciona:</strong></p>
<ul>
<li>Avanza por los módulos a tu ritmo</li>
<li>Completa los ejercicios con honestidad (se guardan automáticamente)</li>
<li>Puedes volver a cualquier módulo desde el menú lateral</li>
<li>Tu progreso se marca con ✓ en los módulos completados</li>
</ul>
<p style="margin-top:30px;font-style:italic;color:#667eea">"El viaje de mil millas comienza con un solo paso. Hoy das ese primer paso hacia tu sanación."</p>
${navBtns(i)}</div>`;
}
if(i===1){
return`<div class="module-content"><h2>Módulo 1: El Socavón</h2>
<p>Imagina que tu vida es como una ciudad hermosa, con calles pavimentadas, edificios brillantes y plazas llenas de vida. Pero debajo de esa ciudad, escondido donde nadie puede verlo, hay un socavón que crece día a día. Al principio es pequeño, casi imperceptible, pero con el tiempo se hace más grande y más peligroso.</p>
<p>Ese socavón representa el dolor no sanado, las heridas emocionales que hemos enterrado, las palabras que nunca dijimos, las lágrimas que tragamos, los gritos que silenciamos. Y aunque tratemos de ignorarlo, aunque sigamos construyendo encima como si nada pasara, ese vacío sigue ahí, amenazando con derrumbar todo.</p>
<p><strong>La historia de Camila:</strong></p>
<p>Camila tenía 35 años cuando finalmente se detuvo. Durante años había sido "la fuerte" de su familia. Cuando su padre abandonó el hogar, ella tenía solo 12 años, pero decidió que no lloraría. "Alguien tiene que ser fuerte", pensó, viendo a su madre destrozada en el sofá.</p>
<p>Los años pasaron. Camila construyó una carrera exitosa, formó una familia, proyectaba una imagen de éxito y control. Pero por dentro, ese socavón crecía. Cada vez que alguien la decepcionaba, el agujero se hacía más grande. Cada vez que guardaba sus emociones, el vacío se profundizaba.</p>
<p>Un día, mientras conducía al trabajo, algo dentro de ella se quebró. No fue un evento dramático. Solo un comentario casual de su esposo: "Siempre eres tan fría". Y en ese momento, todo el peso de esos 23 años de dolor enterrado la golpeó como una ola gigante.</p>
<p>Tuvo que detenerse en el estacionamiento y llorar por primera vez en décadas. Lloró por la niña de 12 años que nunca pudo despedirse de su padre. Lloró por todos los momentos en que fingió estar bien cuando no lo estaba. Lloró por el socavón que había crecido tanto que ya no podía sostener el peso de su vida perfecta.</p>
<p>Ese fue el día en que Camila decidió comenzar a sanar.</p>
<p><strong>Tu socavón también existe.</strong> Tal vez no lo veas todos los días. Tal vez hayas aprendido a vivir con él, a caminar con cuidado para no caer. Pero está ahí. Y este proceso es tu oportunidad para bajara su interior, iluminarlo, y comenzar a llenarlo con tierra firme.</p>
${doneBadge()}
<div class="ejercicio">
<h3>📝 Ejercicio de Reflexión:</h3>
<p><strong>Describe tu socavón.</strong> ¿Qué dolor has estado evitando? ¿Qué emociones has enterrado? ¿Qué historias de tu pasado siguen doliendo en silencio? Escribe sin filtros, esto es solo para ti.</p>
<textarea id="m1_main" oninput="saveAns('m1_main',this.value)" placeholder="Escribe aquí tu reflexión..."></textarea>
</div>
${navBtns(i)}</div>`;
}
if(i===2){
return`<div class="module-content"><h2>Módulo 2: Las Máscaras Que Usamos</h2>
<p>Todos usamos máscaras. Las ponemos cada mañana junto con nuestra ropa, y las llevamos durante todo el día. Son las versiones de nosotros mismos que mostramos al mundo: el profesional competente, el amigo siempre disponible, el hijo perfecto, la madre sacrificada.</p>
<p>El problema no es usar máscaras. El problema es cuando las usamos tanto tiempo que olvidamos nuestro verdadero rostro. Cuando la máscara se pega tanto a nuestra piel que ya no podemos quitarla sin sentir que nos arrancan parte de nosotros mismos.</p>
<p><strong>La historia de Roberto:</strong></p>
<p>Roberto era el payaso del grupo. Desde que tenía uso de razón, su papel era hacer reír a los demás. En la escuela, cuando el ambiente se ponía tenso, Roberto solía una broma. En su familia, cuando las peleas amenazaban con estallar, Roberto convertía todo en chiste.</p>
<p>"Siempre tan alegre", decía la gente. "Nunca lo he visto triste", comentaban sus amigos. Y Roberto sonreía, porque eso era lo que se esperaba de él. Esa era su máscara.</p>
<p>Pero las máscaras pesan. Y la de Roberto pesaba toneladas. Había días en que se sentía devastado por dentro, pero seguía sonriendo. Había noches en que lloraba solo en su habitación, para al día siguiente ponerse nuevamente la máscara del que siempre está bien.</p>
<p>Todo cambió el día que su mejor amigo se suicidó. En el funeral, mientras todos esperaban que Roberto dijera algo gracioso para aliviar el dolor, él simplemente no pudo. La máscara se resquebrajó. Por primera vez en su vida adulta, Roberto permitió que otros lo vieran llorar, desconsolado, roto.</p>
<p>"No tengo que estar bien todo el tiempo", se dijo esa noche. Y aunque fue aterrador quitarse la máscara, también fue liberador. Descubrió que la gente no lo abandonó cuando mostró su verdadero dolor. De hecho, sus amistades se hicieron más profundas.</p>
<p><strong>Tus máscaras:</strong> ¿Cuáles son las que usas? ¿El fuerte que nunca pide ayuda? ¿La perfecta que nunca falla? ¿El ocupado que no tiene tiempo para sentir? ¿La alegre que esconde su tristeza?</p>
${doneBadge()}
<div class="ejercicio">
<h3>📝 Identifica tus máscaras:</h3>
<p>Describe las máscaras que usas en tu vida diaria. ¿Quién pretendes ser? ¿Qué partes de ti ocultas? ¿Qué pasaría si te quitaras esas máscaras?</p>
<textarea id="m2_main" oninput="saveAns('m2_main',this.value)" placeholder="Escribe sobre tus máscaras..."></textarea>
</div>
${navBtns(i)}</div>`;
}
if(i===3){
return`<div class="module-content"><h2>Módulo 3: La Sombra Interior</h2>
<p>Carl Jung lo llamó "la sombra": esa parte de nosotros que rechazamos, que negamos, que escondemos incluso de nosotros mismos. Son los aspectos de nuestra personalidad que consideramos inaceptables, las emociones que juzgamos como negativas, los pensamientos que nos avergüenzan.</p>
<p>Pero la sombra no desaparece solo porque la ignoremos. De hecho, cuanto más la negamos, más poder tiene sobre nosotros. Se manifiesta en nuestras reacciones exageradas, en nuestros juicios hacia otros, en esos momentos en que "no sabemos qué nos pasó".</p>
<p><strong>La historia de Sofía:</strong></p>
<p>Sofía se consideraba una persona paciente y comprensiva. Trabajaba como maestra y todos la adoraban por su dulzura. "Nunca te enojas", le decían sus amigas. Y Sofía asentiría con orgullo, porque había aprendido desde niña que enojarse era "de mala educación".</p>
<p>Pero la ira que Sofía negaba no había desaparecido. Estaba ahí, en su sombra, creciendo cada vez que alguien se aprovechaba de su "paciencia", cada vez que decía sí cuando quería decir no.</p>
<p>Un día, un alumno rompió su taza favorita - un regalo de su abuela fallecida. Era un accidente, algo pequeño. Pero Sofía explotó. Gritó de una manera que asustó a todos, incluida ella misma. La ira de años, la ira que había negado por décadas, salió de golpe.</p>
<p>Después, sentada en su auto, Sofía se preguntó: "¿Quién soy realmente? ¿La paciente o la que acaba de gritar como loca?" La respuesta: ambas. Y hasta que no aceptara su ira, su sombra seguiría controlando su vida.</p>
<p>El trabajo con la sombra no es convertirnos en nuestros peores impulsos. Es integrar esas partes rechazadas, reconocerlas, y aprender a expresarlas de manera saludable. Porque lo que negamos nos controla. Lo que aceptamos, podemos transformar.</p>
${doneBadge()}
<div class="ejercicio">
<h3>📝 Tu sombra:</h3>
<p>¿Qué emociones o aspectos de ti mismo has estado negando? ¿Cuándo fue la última vez que tu sombra "tomó control" y reaccionaste de una forma que te sorprendió? Escribe sobre ello.</p>
<textarea id="m3_main" oninput="saveAns('m3_main',this.value)" placeholder="Explora tu sombra aquí..."></textarea>
</div>
${navBtns(i)}</div>`;
}
if(i===4){
return`<div class="module-content"><h2>Módulo 4: El Niño Interior Herido</h2>
<p>Dentro de cada adulto vive todavía un niño. Ese niño que fuiste, con sus sueños, sus miedos, sus heridas. Y aunque hemos crecido, aunque ahora tengamos responsabilidades y apariencia de adultos, ese niño interior sigue ahí, influyendo en nuestras decisiones, nuestras reacciones, nuestras relaciones.</p>
<p>Cuando ese niño interior está herido, carga con dolor que nunca fue validado, necesidades que nunca fueron satisfechas, amor que nunca recibió. Y desde ese lugar de herida, sabotea nuestra vida adulta sin que nos demos cuenta.</p>
<p><strong>La historia de Marcos:</strong></p>
<p>Marcos tenía un patrón: cada vez que una relación se volvía seria, él encontraba una forma de sabotearla. Buscaba peleas por cosas pequeñas, se distanciaba emocionalmente, o directamente desaparecía. "No estoy hecho para el compromiso", se decía a sí mismo.</p>
<p>En terapia, descubrió algo que cambió su vida: cuando tenía 7 años, su madre lo dejó en casa de su abuela "por unos días". Esos días se convirtieron en meses. Aunque finalmente regresó, el niño de 7 años aprendió una lección devastadora: "Las personas que amas te abandonan. Es mejor irse primero antes de que te dejen".</p>
<p>Ese niño herido de 7 años seguía tomando decisiones en la vida de Marcos adulto. Cada vez que una pareja se acercaba demasiado, el niño asustado tomaba el control y huía.</p>
<p>Sanar el niño interior significó para Marcos volver a ese momento doloroso, abrazar a ese niño de 7 años, y decirle: "No fue tu culpa. Eras digno de amor. Y ahora, yo como adulto, voy a cuidarte y protegerte".</p>
<p><strong>Tu niño interior:</strong> ¿Qué heridas carga? ¿Qué necesitó y nunca recibió? ¿Cómo sigue afectando tu vida hoy?</p>
${doneBadge()}
<div class="ejercicio">
<h3>📝 Carta a tu niño interior:</h3>
<p>Escribe una carta a tu niño interior. Habla con ese niño/a que fuiste. ¿Qué necesitaba escuchar? ¿Qué le dirías ahora desde tu yo adulto?</p>
<textarea id="m4_main" oninput="saveAns('m4_main',this.value)" placeholder="Querido niño interior..."></textarea>
</div>
${navBtns(i)}</div>`;
}
if(i===5){
return`<div class="module-content"><h2>Módulo 5: Las Creencias Que Te Limitan</h2>
<p>Nuestras creencias son como lentes a través de los cuales vemos el mundo. El problema es que muchas de esas creencias las adoptamos cuando éramos niños, en momentos de dolor o confusión, y nunca las cuestionamos. Simplemente las aceptamos como "verdades" sobre nosotros y el mundo.</p>
<p>"No soy suficiente". "No merezco amor". "El mundo es peligroso". "No puedo confiar en nadie". "Siempre terminaré solo". Estas creencias se convierten en profecías autocumplidas. No porque sean verdad, sino porque actuamos como si lo fueran.</p>
<p><strong>La historia de Ana:</strong></p>
<p>Ana creció en una familia donde el dinero siempre faltaba. Escuchó miles de veces: "El dinero no crece en los árboles", "Somos pobres y así seremos siempre", "Los ricos son corruptos". Sin darse cuenta, Ana adoptó una creencia: "No merezco prosperidad".</p>
<p>Años después, con un título universitario y talento de sobra, Ana seguiría autosaboteándose. Cada vez que tenía una oportunidad de ganar más dinero, encontraba una excusa para no tomarla. Cada vez que le ofrecían un ascenso, sentía que "no era para ella". Inconscientemente, estaba cumpliendo la profecía de su infancia.</p>
<p>Todo cambió cuando un mentor le preguntó: "¿Y si eso que crees sobre ti misma simplemente no fuera verdad?" Ana se quedó en shock. Nunca había cuestionado esa creencia. Era como cuestionar la gravedad.</p>
<p>Pero empezó a hacerlo. Escribió cada creencia limitante que tenía sobre el dinero y el éxito. Y junto a cada una, escribió evidencia de que no era verdad. "No merezco prosperidad" vs. "He trabajado duro, tengo talento, y he ayudado a muchas personas". Poco a poco, las creencias comenzaron a aflojarse.</p>
<p>Hoy Ana tiene un negocio exitoso. No porque cambió quién era, sino porque cambió lo que creía sobre quién era.</p>
${doneBadge()}
<div class="ejercicio">
<h3>📝 Tus creencias limitantes:</h3>
<p>Escribe 5 creencias limitantes que tienes sobre ti mismo. Pueden ser sobre tu valor, tus capacidades, tus relaciones, el dinero, etc. Luego preguntate: ¿De dónde viene esta creencia? ¿Es realmente verdad?</p>
<textarea id="m5_main" oninput="saveAns('m5_main',this.value)" placeholder="Mis creencias limitantes..."></textarea>
</div>
${navBtns(i)}</div>`;
}
if(i===6){
return`<div class="module-content"><h2>Módulo 6: Las Heridas del Alma</h2>
<p>Todos cargamos heridas. Algunas son visibles, otras están tan profundas que ni siquiera nosotros las vemos claramente. Son los momentos en que fuimos traicionados, abandonados, humillados, rechazados. Son las palabras que nos clavaron como puñales y que todavía duelen cuando las recordamos.</p>
<p>Estas heridas no sanan solas con el tiempo. De hecho, si no las atendemos, se infectan. Se convierten en resentimiento, en amargura, en patrones destructivos que repetimos sin entender por qué.</p>
<p><strong>La historia de Diego:</strong></p>
<p>Diego era un hombre exitoso en los negocios, pero un desastre en las relaciones. Cada vez que una mujer intentaba acercarse realmente a él, Diego encontraba "defectos" que lo justificaban para terminar la relación. "Era muy demandante", "No era suficientemente independiente", "Quería cambiarme".</p>
<p>En el fondo, Diego cargaba una herida que nunca había sanado: cuando tenía 15 años, su primer amor - María - lo dejó por su mejor amigo. La traición fue doble y devastadora. Diego juró que nunca más nadie lo lastimaría así.</p>
<p>Y lo logró... pero a un precio terrible. Construyó muros tan altos que nadie podía entrar realmente. Cada vez que alguien se acercaba demasiado, la herida del adolescente de 15 años gritaba: "¡Peligro! Te van a traicionar". Y Diego huía.</p>
<p>La sanación llegó cuando Diego finalmente pudo volver a ese momento doloroso, no para revivirlo, sino para procesarlo. Lloró por el adolescente herido que nunca pudo llorar entonces. Reconoció que lo que María hizo fue sobre ella, no sobre su valor como persona. Y decidió que esa herida de hace 20 años ya no iba a dictaminar su futuro.</p>
<p>Hoy Diego está en una relación sana. No porque encontró a "la indicada", sino porque finalmente sanó su herida y pudo abrirse al amor sin miedo.</p>
${doneBadge()}

if(i===7){
return`<div class="module-content"><h2>Módulo 7: El Poder del Perdón</h2>
<p>El perdón no es para la persona que te lastimó. El perdón es para ti. Es la decisión de dejar de cargar el veneno que te está envenenando a ti, no a ellos.</p>
<p>Cuando guardamos resentimiento, es como tomar veneno esperando que la otra persona muera. Nos corroe por dentro, nos amarga, nos convierte en versiones más pequeñas y más oscuras de quienes realmente somos.</p>
<p>Pero entiende esto: perdonar NO significa justificar lo que te hicieron. NO significa olvidar. NO significa volver a confiar en quien te traicionó. Perdonar significa soltar el control que esa persona sigue teniendo sobre tu paz, tu presente, tu futuro.</p>
<p><strong>La historia de Laura:</strong></p>
<p>Laura cargaba 15 años de ira hacia su hermana. Habían tenido una pelea terrible por la herencia de su madre, y desde entonces no se hablaban. "Nunca la perdonaré", decía Laura con determinación. "No se merece mi perdón".</p>
<p>Pero ese resentimiento se había metido en cada área de su vida. Laura estaba irritable con sus hijos, distante con su esposo, amárgada en su trabajo. El veneno que guardaba para su hermana la estaba envenenando a ella.</p>
<p>Un día, su hija de 10 años le preguntó: "Mami, ¿por qué siempre estás enojada?" Laura se vio en el espejo y no le gustó lo que vio. Se había convertido en una persona amargada, y su hermana ni siquiera lo sabía porque no se hablaban.</p>
<p>El perdón no llegó de un día para otro. Laura no llamó a su hermana ni restableció la relación. Pero un día, sentada en su jardín, tomó una decisión: "Suelto este resentimiento. No porque ella lo merezca, sino porque yo merezco paz".</p>
<p>Escribió una carta que nunca envió, en la que expresaba todo su dolor y luego declaraba su perdón. La quemó en el jardín, como un ritual simbólico de liberación. Y aunque su hermana nunca supo de ese momento, Laura sintió cómo un peso gigante salía de sus hombros.</p>
<p>El perdón no cambió el pasado. Pero le devolvió su presente y su futuro.</p>

<p>Pero durante el tratamiento, algo empezó a cambiar. Empezó a notar cosas que antes pasaba por alto: el calor del sol en su rostro, la risa de sus hijos, el abrazo de su esposo, el sabor real de la comida. "He estado dormida toda mi vida", pensó un día. "Necesité que la muerte me tocara el hombro para despertar".</p>

<p>Después de su divorcio, en su pequeño apartamento, Carmen se miró al espejo y se preguntó: "¿Quién eres tú, Carmen? No la doctora, no la ex esposa, no la madre. ¿Quién ERES?"</p>
