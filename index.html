<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sana Tu Mundo Interior - Proceso Interactivo</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:900px;width:95%;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden}
.login-screen{padding:60px 40px;text-align:center}
.login-screen h1{color:#667eea;font-size:2.5rem;margin-bottom:20px}
.login-screen p{color:#555;margin-bottom:30px;font-size:1.1rem}
.login-screen input{width:100%;max-width:300px;padding:15px;border:2px solid #ddd;border-radius:10px;font-size:1.1rem;margin-bottom:20px}
.login-screen button{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:15px 50px;border-radius:10px;font-size:1.2rem;cursor:pointer;transition:transform 0.2s}
.login-screen button:hover{transform:scale(1.05)}
.app-container{display:none}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px 30px;text-align:center}
.header h1{font-size:1.8rem}
.main-content{display:flex;min-height:calc(100vh - 140px)}
.sidebar{width:280px;background:#f8f9fa;padding:25px 15px;overflow-y:auto;border-right:2px solid #e0e0e0}
.module-item{padding:12px 15px;margin:8px 0;background:white;border-radius:8px;cursor:pointer;transition:all 0.3s;border-left:4px solid transparent;font-size:0.95rem}
.module-item:hover{background:#e8eaf6;border-left-color:#667eea}
.module-item.completed{background:#e8f5e9;border-left-color:#4caf50}
.module-item.completed::after{content:' ✓';color:#4caf50;font-weight:bold}
.module-item.active{background:#667eea;color:white;border-left-color:#764ba2}
.content-area{flex:1;padding:40px;overflow-y:auto;max-height:calc(100vh - 140px)}
.module-content{display:none}
.module-content.active{display:block;animation:fadeIn 0.5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.module-content h2{color:#667eea;font-size:2rem;margin-bottom:20px;border-bottom:3px solid #764ba2;padding-bottom:10px}
.module-content h3{color:#764ba2;font-size:1.5rem;margin:25px 0 15px;font-weight:600}
.module-content p{color:#333;line-height:1.8;margin-bottom:15px;font-size:1.05rem}
.module-content ul,.module-content ol{margin-left:25px;margin-bottom:15px;color:#333;line-height:1.8}
.module-content li{margin-bottom:10px}
.exercise-box{background:#f0f4ff;padding:25px;border-radius:12px;margin:25px 0;border-left:5px solid #667eea}
.exercise-box h4{color:#667eea;margin-bottom:15px;font-size:1.2rem;display:flex;align-items:center;gap:8px}
.exercise-box textarea{width:100%;min-height:120px;padding:15px;border:2px solid #ddd;border-radius:8px;font-size:1rem;font-family:inherit;resize:vertical;margin-top:10px}
.exercise-box textarea:focus{outline:none;border-color:#667eea}
.exercise-hint{background:#fff3cd;padding:15px;border-radius:8px;margin-top:15px;border-left:4px solid:#856404;font-size:0.95rem;color:#856404}
.story-box{background:#f3e5f5;padding:25px;border-radius:12px;margin:25px 0;border-left:5px solid #9c27b0}
.story-box h4{color:#9c27b0;margin-bottom:15px;font-size:1.2rem}
.reflection-box{background:#e8f5e9;padding:20px;border-radius:12px;margin:20px 0;border-left:5px solid #4caf50}
.reflection-box h4{color:#2e7d32;margin-bottom:10px}
.nav-buttons{display:flex;justify-content:space-between;margin-top:35px;padding-top:25px;border-top:2px solid #e0e0e0}
.nav-buttons button{padding:12px 30px;border:none;border-radius:10px;font-size:1.05rem;cursor:pointer;transition:all 0.3s}
.btn-prev{background:#e0e0e0;color:#555}
.btn-prev:hover{background:#bdbdbd}
.btn-next{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,0.4)}
.btn-next:disabled{background:#ccc;cursor:not-allowed;transform:none}
.completion-badge{background:#4caf50;color:white;padding:15px 25px;border-radius:10px;text-align:center;margin:20px 0;font-size:1.1rem;font-weight:600}
.quote-box{background:#fff9c4;padding:20px;border-radius:10px;margin:20px 0;border-left:5px solid #fbc02d;font-style:italic;color:#555}
.small-exercise{background:#f5f5f5;padding:15px;border-radius:8px;margin:15px 0;border-left:3px solid #667eea}
.small-exercise input[type="text"]{width:100%;padding:10px;border:2px solid #ddd;border-radius:6px;margin-top:8px;font-size:1rem}
.small-exercise input[type="text"]:focus{outline:none;border-color:#667eea}
    </style>
</head>
<body>

<div class="container">
    <div class="login-screen" id="loginScreen">
        <h1>🌟 Sana Tu Mundo Interior</h1>
        <p>Tu Viaje de Transformación</p>
        <input type="text" id="accessCode" placeholder="Código de acceso">
        <br><button onclick="checkAccess()">Comenzar el Viaje</button>
    </div>

    <div class="app-container" id="appContainer">
        <div class="header">
            <h1>🌟 Sana Tu Mundo Interior - Tu Viaje de Transformación</h1>
        </div>
        <div class="main-content">
            <div class="sidebar" id="sidebar"></div>
            <div class="content-area" id="contentArea"></div>
        </div>
    </div>
</div>

<script>
const modules = [
    {
        id: 0,
        title: 'Bienvenida al Viaje',
        content: `
            <h2>🌟 Bienvenida/o a Tu Viaje de Transformación</h2>
            
            <p>Has tomado una decisión valiente: embarcarte en el viaje más importante de tu vida, el viaje hacia tu interior. Este no es un camino fácil, pero es el único que realmente transforma.</p>
            
            <p>Durante este proceso, vas a descubrir partes de ti que quizás habías olvidado o nunca conociste. Vas a enfrentar sombras, a quitarte máscaras, a sanar heridas profundas. Pero también vas a encontrar tu luz, tu autenticidad, tu poder interior.</p>
            
            <div class="quote-box">
                <p>"El viaje más largo es el viaje hacia adentro." - Dag Hammarskjöld</p>
            </div>
            
            <h3>¿Cómo funciona este proceso?</h3>
            <p>Este viaje está dividido en 10 módulos. Cada uno representa una etapa esencial de tu transformación:</p>
            
            <ul>
                <li><strong>Módulo 1: El Socavón</strong> - Reconocer tu crisis y aceptar que necesitas cambiar</li>
                <li><strong>Módulo 2: Las Máscaras</strong> - Identificar las falsas identidades que has construido</li>
                <li><strong>Módulo 3: La Sombra</strong> - Enfrentar tus partes rechazadas</li>
                <li><strong>Módulo 4: El Niño Interior</strong> - Sanar las heridas de tu infancia</li>
                <li><strong>Módulo 5: Creencias Limitantes</strong> - Desmontar los pensamientos que te aprisionan</li>
                <li><strong>Módulo 6: Las Heridas</strong> - Reconocer y transformar el dolor del pasado</li>
                <li><strong>Módulo 7: El Perdón</strong> - Liberarte del resentimiento</li>
                <li><strong>Módulo 8: La Gratitud</strong> - Cultivar una nueva forma de ver la vida</li>
                <li><strong>Módulo 9: Tu Nuevo Yo</strong> - Diseñar conscientemente quién quieres ser</li>
                <li><strong>Módulo 10: El Plan de Acción</strong> - Crear un camino concreto hacia tu transformación</li>
            </ul>
            
            <h3>Importante:</h3>
            <p>Este proceso requiere honestidad brutal contigo mismo/a. No hay respuestas correctas o incorrectas. Solo hay TU verdad.</p>
            
            <p>Cada módulo incluye ejercicios prácticos. Tómate el tiempo necesario para completarlos con profundidad. La transformación real sucede en el trabajo interno, no en la lectura superficial.</p>
            
            <div class="exercise-box">
                <h4>✍️ Compromiso Inicial</h4>
                <p>Antes de comenzar, escribe tu compromiso contigo mismo/a. ¿Por qué estás aquí? ¿Qué esperas lograr con este viaje?</p>
                <textarea data-exercise="welcome-commitment" placeholder="Mi compromiso es..."></textarea>
                <div class="exercise-hint">💡 Sé específico. Este compromiso será tu ancla cuando el proceso se ponga difícil.</div>
            </div>
        `
    },
    {
        id: 1,
        title: 'Módulo 1: El Socavón',
        content: `
            <h2>Módulo 1: El Socavón</h2>
            
            <h3>Reconociendo Tu Crisis</h3>
            
            <p>Hay momentos en la vida en que el suelo se abre bajo nuestros pies. De repente, todo lo que creíamos sólido se desmorona. La relación que pensábamos eterna termina. El trabajo que definía nuestra identidad desaparece. La salud que dábamos por sentada nos falla. Los sueños que perseguimos durante años se revelan vacios.</p>
            
            <p>Esto es el socavón: ese momento de crisis profunda donde todo lo conocido se derrumba y nos encontramos caídos en la oscuridad, sin saber cómo salir.</p>
            
            <div class="story-box">
                <h4>💭 La historia de Camila</h4>
                <p>Camila tenía 35 años cuando su mundo se derrumbó. Después de 12 años de matrimonio, su esposo le confesó que había estado viviendo una doble vida. Tenía otra familia. Otros hijos.</p>
                <p>El socavón de Camila no fue solo el fin de su matrimonio. Fue el colapso de toda su identidad. Ella se había definido como "la esposa perfecta". Había sacrificado su carrera, sus amistades, sus sueños personales por "su familia". Y ahora descubría que esa familia que ella creía conocer era una ilusión.</p>
                <p>Durante meses, Camila apenas podía levantarse de la cama. Se preguntaba cómo no había visto las señales. Cómo había sido tan ciega. Se culpaba, se odiaba, sentía que su vida había sido una mentira.</p>
                <p>Pero el socavón, aunque doloroso, fue el comienzo de su verdadera transformación. Porque en la oscuridad de ese abismo, Camila finalmente tuvo que preguntarse: ¿Quién soy yo sin este matrimonio? ¿Quién soy yo más allá de ser "la esposa perfecta"?</p>
            </div>
            
            <p>El socavón es doloroso, pero también es sagrado. Es el momento en que la vida nos obliga a despertar. Es la invitación, aunque brutal, a dejar de vivir en automático y comenzar a vivir conscientemente.</p>
            
            <h3>Las Señales del Socavón</h3>
            <p>No siempre el socavón es tan dramático como el de Camila. A veces es más sutil:</p>
            <ul>
                <li>Despertar cada mañana con una sensación de vacío, aunque tu vida "debería" hacerte feliz</li>
                <li>Sentir que estás representando un papel, pero no sabes quién eres realmente</li>
                <li>Una ansiedad constante que no logras explicar</li>
                <li>La sensación de estar viviendo la vida que otros esperan de ti, no la tuya</li>
                <li>Relaciones que se sienten vacias, aunque estés rodeado de gente</li>
                <li>Logros que no te dan la satisfacción que esperabas</li>
            </ul>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 1: Identificando Tu Socavón</h4>
                <p>¿Cuál fue o es tu socavón? Describe la situación o momento en que sentiste que todo se derrumbaba. Si aún no has identificado un momento específico, describe la sensación de vacío o crisis que te trajo aquí.</p>
                <textarea data-exercise="mod1-ex1" placeholder="Mi socavón fue..."></textarea>
                <div class="exercise-hint">💡 No censures. Escribe sin filtros. Nadie más va a leer esto.</div>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 2: Las Emociones del Socavón</h4>
                <p>¿Qué emociones estás sintiendo o sentiste en tu socavón? Nombra todas las que puedas identificar (miedo, rabia, tristeza, culpa, vergüenza, confusión, etc.)</p>
                <textarea data-exercise="mod1-ex2" placeholder="Las emociones que siento/sentí son..."></textarea>
                <div class="exercise-hint">💡 Nombrar las emociones es el primer paso para procesarlas. No intentes ser "positivo" todavía.</div>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 3: Las Pérdidas</h4>
                <p>¿Qué has perdido o sientes que estás perdiendo? (pueden ser cosas concretas como relaciones o trabajo, o abstractas como seguridad, identidad, confianza)</p>
                <textarea data-exercise="mod1-ex3" placeholder="He perdido o estoy perdiendo..."></textarea>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 4: La Resistencia</h4>
                <p>¿De qué maneras has intentado evitar o negar tu socavón? ¿Cómo has tratado de escapar del dolor? (adicciones, distracciones, negación, culpar a otros, etc.)</p>
                <textarea data-exercise="mod1-ex4" placeholder="He intentado evitar mi dolor mediante..."></textarea>
                <div class="exercise-hint">💡 La resistencia es natural. Reconocerla es valiente.</div>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 5: El Regalo Oculto</h4>
                <p>Aunque ahora parezca imposible, todos los socavones traen un regalo: la oportunidad de transformación. ¿Puedes imaginar, aunque sea vagamente, qué podría surgir de esta crisis? ¿Qué versión de ti podría nacer de este dolor?</p>
                <textarea data-exercise="mod1-ex5" placeholder="El posible regalo de mi socavón podría ser..."></textarea>
                <div class="exercise-hint">💡 Está bien si aún no ves nada positivo. Simplemente permite la posibilidad de que exista.</div>
            </div>
        `
    },
    {
        id: 2,
        title: 'Módulo 2: Las Máscaras',
        content: `
            <h2>Módulo 2: Las Máscaras</h2>
            
            <h3>Las Identidades Falsas que Construimos</h3>
            
            <p>Desde muy temprano en la vida, aprendemos que mostrar quiénes somos realmente no es seguro. Cuando el niño expresa rabia y es castigado, cuando la niña muestra vulnerabilidad y es rechazada, cuando nuestras necesidades auténticas son ignoradas o ridiculizadas, aprendemos una lección dolorosa: ser yo mismo no es aceptable.</p>
            
            <p>Entonces comenzamos a usar máscaras. Construimos personajes que creemos que serán más aceptables, más amados, más exitosos. "El bueno", "la perfecta", "el fuerte", "la alegre", "el exitoso", "la cuidadora". Estas máscaras nos protegen, pero también nos aprisionan.</p>
            
            <div class="story-box">
                <h4>💭 La historia de Roberto</h4>
                <p>Roberto creció en una familia donde los hombres no lloraban. Su padre era duro, exigente, emocionalmente distante. Cuando Roberto tenía 8 años y lloraba porque otros niños lo habían golpeado, su padre le dijo: "Los hombres no lloran. Deja de ser una niña."</p>
                <p>Roberto aprendió la lección. Construyó una máscara de fortaleza. Se volvió "el fuerte", el que nunca mostraba debilidad, el que siempre tenía todo bajo control. Esta máscara le sirvió bien en muchos sentidos. Lo ayudó a ser respetado, a tener éxito en su carrera, a ser visto como un líder.</p>
                <p>Pero a los 40 años, Roberto se encontró en su socavón. Su esposa le pidió el divorcio. "Vivo contigo", le dijo, "pero no te conozco. Nunca sé qué sientes realmente. Es como vivir con una estatua."</p>
                <p>Roberto se dio cuenta de que había usado su máscara durante tanto tiempo que ya no sabía qué había debajo. ¿Quién era él sin la máscara del hombre fuerte? ¿Qué sentía realmente? Había enterrado sus emociones tan profundo que ya no podía acceder a ellas.</p>
            </div>
            
            <h3>Los Tipos de Máscaras Más Comunes</h3>
            <ul>
                <li><strong>El/La Perfeccionista:</strong> "Si lo hago todo perfecto, seré amado/a y aceptado/a"</li>
                <li><strong>El/La Complaciente:</strong> "Si hago felices a todos, nadie me abandonará"</li>
                <li><strong>El/La Fuerte:</strong> "Si nunca muestro debilidad, estaré a salvo"</li>
                <li><strong>El/La Exitoso/a:</strong> "Si tengo éxito, valdré algo"</li>
                <li><strong>El/La Alegre:</strong> "Si siempre estoy positivo/a, nadie verá mi dolor"</li>
                <li><strong>El/La Cuidador/a:</strong> "Si cuido de todos, seré necesario/a y no me abandonarán"</li>
                <li><strong>El/La Rebelde:</strong> "Si rechazo todo, nadie podrá herirme"</li>
                <li><strong>El/La Víctima:</strong> "Si muestro cuánto sufro, alguien vendrá a rescatarme"</li>
            </ul>
            
            <p>El problema no es que estas máscaras existan. Fueron estrategias de supervivencia necesarias. El problema es cuando olvidamos que son máscaras y las confundimos con nuestra verdadera identidad.</p>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 1: Identificando Tus Máscaras</h4>
                <p>¿Qué máscaras has usado en tu vida? De la lista anterior u otras que identifiques, ¿cuáles reconoces en ti?</p>
                <textarea data-exercise="mod2-ex1" placeholder="Las máscaras que he usado son..."></textarea>
                <div class="exercise-hint">💡 La mayoría usamos varias máscaras en diferentes contextos. Sé honesto/a.</div>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 2: ¿Cómo Construiste Tus Máscaras?</h4>
                <p>¿Cuándo y cómo aprendiste a usar esas máscaras? ¿Qué situaciones de tu infancia o juventud te enseñaron que no era seguro ser tú mismo/a?</p>
                <textarea data-exercise="mod2-ex2" placeholder="Aprendí a usar máscaras cuando..."></textarea>
                <div class="exercise-hint">💡 Recuerda momentos específicos donde decidiste ocultar partes de ti.</div>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 3: El Precio de las Máscaras</h4>
                <p>¿Qué te han costado estas máscaras? ¿Qué has sacrificado por mantenerlas? (autenticidad, intimidad, energía, salud, relaciones profundas, etc.)</p>
                <textarea data-exercise="mod2-ex3" placeholder="Mis máscaras me han costado..."></textarea>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 4: Momentos Sin Máscara</h4>
                <p>¿Recuerdas algún momento en que te quitaste la máscara y mostraste quién eres realmente? ¿Qué pasó? ¿Cómo te sentiste?</p>
                <textarea data-exercise="mod2-ex4" placeholder="Un momento sin máscara fue..."></textarea>
                <div class="exercise-hint">💡 Estos momentos nos muestran qué es posible cuando somos auténticos.</div>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 5: El Miedo a Quitarte la Máscara</h4>
                <p>¿Qué temes que pasaría si te quitaras tus máscaras? ¿Qué es lo peor que podría suceder?</p>
                <textarea data-exercise="mod2-ex5" placeholder="Si me quitara mis máscaras, temo que..."></textarea>
                <div class="exercise-hint">💡 Nombrar el miedo es el primer paso para desarmarlo.</div>
            </div>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 6: ¿Quién Eres Sin la Máscara?</h4>
                <p>Debajo de todas tus máscaras, ¿quién eres? ¿Qué partes de ti has estado ocultando?</p>
                <textarea data-exercise="mod2-ex6" placeholder="Sin mis máscaras, yo soy..."></textarea>
                <div class="exercise-hint">💡 Está bien si aún no lo sabes completamente. Este es solo el comienzo de tu exploración.</div>
            </div>
        `
    },
    {
        id: 3,
        title: 'Módulo 3: La Sombra',
        content: `
            <h2>Módulo 3: La Sombra</h2>
            
            <h3>Enfrentando Lo Que Hemos Rechazado</h3>
            
            <p>Carl Jung lo explicó claramente: la sombra es todo aquello en nosotros que hemos rechazado, negado o reprimido porque lo consideramos inaceptable. Son las partes de nosotros mismos que hemos exiliado al inconsciente porque nos avergüenzan, nos asustan o contradicen la imagen que queremos proyectar.</p>
            
            <p>La ironía es que mientras más rechazamos nuestra sombra, más poder tiene sobre nosotros. Lo que negamos no desaparece, solo se vuelve inconsciente y comienza a controlarnos desde ahí.</p>
            
            <div class="story-box">
                <h4>💭 La historia de Sofía</h4>
                <p>Sofía se enorgullecía de ser "la buena". Nunca se enojaba, siempre era amable, siempre ponía las necesidades de otros primero. Se consideraba una persona espiritual, evolucionada, pacífica.</p>
                <p>Pero Sofía tenía un secreto que ni siquiera se confesaba a sí misma: estaba llena de rabia. Rabia contra su madre que siempre la criticaba. Rabia contra su hermana que siempre recibía más atención. Rabia contra su jefe que abusaba de su amabilidad. Rabia contra su pareja que daba por sentado todo lo que ella hacía.</p>
                <p>Esta rabia era su sombra. Y como Sofía la rechazaba ("las personas espirituales no se enojan"), la rabia encontraba formas indirectas de salir: comentarios pasivo-agresivos, enfermedades psicosomáticas, sabotaje inconsciente de sus propios proyectos, explosiones ocasionales desproporcionadas por cosas pequeñas.</p>
                <p>El socavón de Sofía llegó cuando desarrolló una úlcera severa. Su cuerpo, cansado de guardar tanta rabia reprimida, colapsó. Fue en terapia donde finalmente comenzó a enfrentar su sombra: esa parte rabiosa, egoísta, que quería gritar "¡YA BASTA!"</p>
                <p>Y cuando finalmente se permitió sentir y expresar esa rabia, algo sorprendente sucedió: se sintió más completa. Más real. Más humana. La rabia, cuando fue reconocida y expresada sanamente, se transformó en límites saludables, en asertividad, en capacidad de decir "no".</p>
            </div>
            
            <h3>¿Cómo Reconocer Tu Sombra?</h3>
            <p>Tu sombra se revela en:</p>
            <ul>
                <li><strong>Lo que más criticas en otros:</strong> A menudo, lo que más nos irrita en los demás son aspectos de nosotros mismos que hemos reprimido.</li>
                <li><strong>Tus "pecados secretos":</strong> Esos pensamientos, deseos o comportamientos que te avergüenzan y no quisieras que nadie supiera.</li>
                <li><strong>Tus reacciones desproporcionadas:</strong> Cuando respondes con una intensidad emocional que no corresponde a la situación.</li>
                <li><strong>Lo que niegas rotundamente:</strong> "Yo NUNCA soy..." "Yo NO soy una persona que..." La negación rotunda suele señalar sombra.</li>
                <li><strong>Tus sueños y pesadillas:</strong> El inconsciente habla a través de símbolos.</li>
            </ul>
            
            <div class="exercise-box">
                <h4>✍️ Ejercicio 1: ¿Qué Rechazas de Ti?</h4>
                <p>¿Qué aspectos de ti mismo/a consideras inaceptables? ¿Qué partes de ti te avergüenzan o te asustan?</p>
                <textarea data-exercise="mod3-ex1" placeholder="Los aspectos que rechazo de mí son..."></textarea>
                <div class="exercise-hint">💡 Este es un ejercicio de honestidad radical. Recuerda: lo que reconoces pierde poder sobre ti.</div>

let currentModule = 0;
let completedModules = new Set();
let answers = {};

function checkAccess() {
    const code = document.getElementById('accessCode').value;
    if (code === 'STM2024') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        loadAnswers();
        renderSidebar();
        showModule(0);
    } else {
        alert('Código incorrecto');
    }
}

function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = modules.map((module, index) => {
        let className = 'module-item';
        if (completedModules.has(index)) className += ' completed';
        if (index === currentModule) className += ' active';
        return `<div class="${className}" onclick="showModule(${index})">${module.title}</div>`;
    }).join('');
}

function showModule(index) {
    currentModule = index;
    const contentArea = document.getElementById('contentArea');
    const module = modules[index];
    
    contentArea.innerHTML = `
        <div class="module-content active">
            ${module.content}
            <div class="nav-buttons">
                <button class="btn-prev" onclick="previousModule()" ${index === 0 ? 'style="visibility:hidden"' : ''}>← Anterior</button>
                <button class="btn-next" id="nextBtn" onclick="nextModule()">${index === modules.length - 1 ? '✅ Completar y continuar' : 'Completar y continuar →'}</button>
            </div>
        </div>
    `;
    
    renderSidebar();
    loadModuleAnswers(index);
    setupExerciseListeners();
    contentArea.scrollTop = 0;
}

function setupExerciseListeners() {
    const textareas = document.querySelectorAll('textarea[data-exercise]');
    const nextBtn = document.getElementById('nextBtn');
    
    function checkCompletion() {
        let hasContent = false;
        textareas.forEach(textarea => {
            if (textarea.value.trim().length >= 10) {
                hasContent = true;
            }
        });
        nextBtn.disabled = !hasContent;
    }
    
    textareas.forEach(textarea => {
        textarea.addEventListener('input', () => {
            saveAnswer(textarea.dataset.exercise, textarea.value);
            checkCompletion();
        });
    });
    
    checkCompletion();
}

function saveAnswer(exercise, value) {
    if (!answers[currentModule]) answers[currentModule] = {};
    answers[currentModule][exercise] = value;
    localStorage.setItem('stm_answers', JSON.stringify(answers));
}

function loadAnswers() {
    const saved = localStorage.getItem('stm_answers');
    if (saved) answers = JSON.parse(saved);
    const completed = localStorage.getItem('stm_completed');
    if (completed) {
        completedModules = new Set(JSON.parse(completed));
    }
}

function loadModuleAnswers(moduleIndex) {
    if (answers[moduleIndex]) {
        Object.entries(answers[moduleIndex]).forEach(([exercise, value]) => {
            const textarea = document.querySelector(`textarea[data-exercise="${exercise}"]`);
            if (textarea) textarea.value = value;
        });
    }
}

function nextModule() {
    completedModules.add(currentModule);
    localStorage.setItem('stm_completed', JSON.stringify([...completedModules]));
    
    if (currentModule < modules.length - 1) {
        showModule(currentModule + 1);
    } else {
        alert('¡Felicitaciones! Has completado todo el viaje de transformación. Recuerda: esto es solo el comienzo. La transformación real sucede en cómo vives cada día.');
    }
}

function previousModule() {
    if (currentModule > 0) {
        showModule(currentModule - 1);
    }
}
</script>
