<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sana Tu Mundo Interior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Variables ─────────────────────────────────────────────── */
:root {
  --rose:     #D93F7A;
  --rose-dk:  #A82E5C;
  --rose-lt:  #F2C4D8;
  --rose-bg:  #FDF0F5;
  --cream:    #FBF7F4;
  --ink:      #1C1018;
  --ink-2:    #4A3040;
  --ink-3:    #7A5868;
  --border:   #E8D5DF;
  --white:    #FFFFFF;
  --green:    #4CAF7A;
  --amber:    #E8A040;
  --sidebar-w: 270px;
  --header-h:  68px;
  --radius:    12px;
  --shadow:    0 2px 20px rgba(217,63,122,.12);
  --shadow-lg: 0 8px 40px rgba(217,63,122,.18);
}

/* ─── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── Login ─────────────────────────────────────────────────── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cream);
  padding: 2rem;
  position: relative;
  overflow: hidden;
}
#loginScreen::before {
  content: '';
  position: absolute;
  top: -30%; right: -20%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, var(--rose-lt) 0%, transparent 65%);
  opacity: .45;
  pointer-events: none;
}
#loginScreen::after {
  content: '';
  position: absolute;
  bottom: -20%; left: -15%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, #F5D0E8 0%, transparent 65%);
  opacity: .35;
  pointer-events: none;
}
.login-card {
  background: var(--white);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  padding: 3.5rem 3rem;
  max-width: 440px;
  width: 100%;
  text-align: center;
  position: relative;
  z-index: 1;
  animation: cardIn .6s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(24px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.login-flower {
  font-size: 2.6rem;
  margin-bottom: 1.2rem;
  display: block;
  animation: spinIn .8s cubic-bezier(.16,1,.3,1) .1s both;
}
@keyframes spinIn {
  from { transform: rotate(-20deg) scale(.6); opacity:0; }
  to   { transform: rotate(0deg) scale(1); opacity:1; }
}
.login-card h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--rose-dk);
  line-height: 1.15;
  margin-bottom: .5rem;
}
.login-card p {
  color: var(--ink-3);
  font-size: .95rem;
  font-weight: 300;
  margin-bottom: 2rem;
  line-height: 1.6;
}
.login-divider {
  width: 40px; height: 2px;
  background: var(--rose);
  margin: 1rem auto 1.8rem;
  border-radius: 2px;
}
.login-card input {
  width: 100%;
  padding: .85rem 1.1rem;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  color: var(--ink);
  background: var(--cream);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  margin-bottom: 1rem;
}
.login-card input:focus {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px var(--rose-lt);
}
.login-card input::placeholder { color: var(--ink-3); }
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  background: var(--rose);
  color: var(--white);
  border: none;
  border-radius: var(--radius);
  padding: .9rem 2rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  transition: background .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 4px 16px rgba(217,63,122,.35);
}
.btn-primary:hover {
  background: var(--rose-dk);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(217,63,122,.45);
}
.btn-primary:active { transform: translateY(0); }
.login-error {
  color: #c0392b;
  font-size: .85rem;
  margin-top: .6rem;
  min-height: 1.2em;
}

/* ─── App shell ──────────────────────────────────────────────── */
#appContainer { display: none; min-height: 100vh; }

/* ─── Header ─────────────────────────────────────────────────── */
.app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  z-index: 100;
  gap: 1rem;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: .7rem;
  flex: 1;
}
.header-logo {
  width: 36px; height: 36px;
  background: var(--rose);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--rose-dk);
  line-height: 1.1;
}
.header-title small {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: .7rem;
  font-weight: 400;
  color: var(--ink-3);
  letter-spacing: .04em;
}
.header-progress {
  display: flex;
  align-items: center;
  gap: .8rem;
  flex-shrink: 0;
}
.progress-track {
  width: 140px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rose), var(--rose-dk));
  border-radius: 3px;
  transition: width .4s ease;
}
.progress-label {
  font-size: .78rem;
  color: var(--ink-3);
  white-space: nowrap;
  font-weight: 500;
}
.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: .4rem;
  color: var(--ink-2);
  font-size: 1.3rem;
}

/* ─── Layout ──────────────────────────────────────────────────── */
.app-body {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ─── Sidebar ─────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--border);
  position: fixed;
  top: var(--header-h);
  bottom: 0;
  left: 0;
  overflow-y: auto;
  padding: 1.4rem .8rem;
  transition: transform .3s cubic-bezier(.16,1,.3,1);
  z-index: 90;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-section {
  font-size: .68rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: .5rem .6rem .4rem;
  margin-top: .6rem;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: .65rem;
  padding: .65rem .8rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all .18s;
  font-size: .88rem;
  font-weight: 400;
  color: var(--ink-2);
  position: relative;
  margin: 2px 0;
  user-select: none;
}
.nav-item:hover { background: var(--rose-bg); color: var(--rose-dk); }
.nav-item.active {
  background: var(--rose);
  color: var(--white);
  font-weight: 600;
  box-shadow: 0 2px 10px rgba(217,63,122,.3);
}
.nav-item.completed { color: var(--ink-2); }
.nav-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: .65rem;
  transition: all .18s;
}
.nav-item.active .nav-dot {
  border-color: rgba(255,255,255,.5);
  background: rgba(255,255,255,.2);
  color: white;
}
.nav-item.completed .nav-dot {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

/* ─── Content ─────────────────────────────────────────────────── */
.content-area {
  flex: 1;
  margin-left: var(--sidebar-w);
  padding: 2.5rem 2rem 4rem;
  max-width: 820px;
}

/* ─── Module header ───────────────────────────────────────────── */
.mod-header {
  margin-bottom: 2rem;
  animation: fadeUp .4s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}
.mod-label {
  display: inline-block;
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: .6rem;
}
.mod-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: .8rem;
}
.mod-header-line {
  width: 48px; height: 3px;
  background: var(--rose);
  border-radius: 2px;
}

/* ─── Body text ───────────────────────────────────────────────── */
.mod-body { animation: fadeUp .4s ease .05s both; }
.mod-body p {
  color: var(--ink-2);
  line-height: 1.85;
  margin-bottom: 1.1rem;
  font-size: 1rem;
  font-weight: 300;
}
.mod-body h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--ink);
  margin: 2rem 0 .7rem;
}
.mod-body ul, .mod-body ol {
  margin: .4rem 0 1.2rem 1.2rem;
  color: var(--ink-2);
  font-weight: 300;
}
.mod-body li {
  margin-bottom: .55rem;
  line-height: 1.7;
  font-size: 1rem;
}
.mod-body li strong { color: var(--ink); font-weight: 600; }

/* ─── Quote ───────────────────────────────────────────────────── */
.quote-box {
  border-left: 3px solid var(--rose);
  padding: 1rem 1.4rem;
  margin: 1.6rem 0;
  font-style: italic;
  color: var(--ink-2);
  background: var(--rose-bg);
  border-radius: 0 8px 8px 0;
}

/* ─── Story ───────────────────────────────────────────────────── */
.story-box {
  border: 1px solid var(--border);
  border-top: 3px solid var(--rose);
  border-radius: var(--radius);
  padding: 1.4rem 1.5rem;
  margin: 1.8rem 0;
  background: var(--white);
}
.story-box .story-label {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: .8rem;
}
.story-box h4 {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: .7rem;
}
.story-box p {
  color: var(--ink-2);
  font-weight: 300;
  line-height: 1.8;
  font-size: .97rem;
  margin-bottom: .8rem;
}
.story-box p:last-child { margin-bottom: 0; }

/* ─── Exercise ────────────────────────────────────────────────── */
.exercise-box {
  background: var(--cream);
  border: 1px solid var(--border);
  border-left: 4px solid var(--rose);
  border-radius: var(--radius);
  padding: 1.4rem 1.5rem;
  margin: 1.6rem 0;
}
.exercise-box h4 {
  font-size: .88rem;
  font-weight: 600;
  color: var(--rose-dk);
  margin-bottom: .9rem;
  display: flex;
  align-items: flex-start;
  gap: .5rem;
}
.exercise-box h4 .ex-num {
  background: var(--rose);
  color: white;
  font-size: .7rem;
  font-weight: 700;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: .05rem;
}
.exercise-box p {
  color: var(--ink-2);
  font-size: .94rem;
  font-weight: 300;
  line-height: 1.75;
  margin-bottom: .8rem;
}
.exercise-box textarea {
  width: 100%;
  min-height: 110px;
  padding: .9rem 1rem;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: .95rem;
  font-weight: 300;
  color: var(--ink);
  background: var(--white);
  resize: vertical;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  line-height: 1.7;
}
.exercise-box textarea:focus {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px var(--rose-lt);
}
.exercise-box textarea::placeholder { color: #b0909c; }
.exercise-hint {
  margin-top: .7rem;
  padding: .6rem .9rem;
  background: #FFF8E8;
  border-left: 3px solid var(--amber);
  border-radius: 0 6px 6px 0;
  font-size: .83rem;
  color: #7A5820;
  line-height: 1.6;
}

/* ─── Nav buttons ─────────────────────────────────────────────── */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2.5rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
  gap: 1rem;
}
.btn-nav {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  padding: .8rem 1.6rem;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: .95rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .2s;
}
.btn-nav.prev {
  background: var(--white);
  color: var(--ink-2);
  border: 1px solid var(--border);
}
.btn-nav.prev:hover { background: var(--rose-bg); border-color: var(--rose-lt); }
.btn-nav.next {
  background: var(--rose);
  color: var(--white);
  box-shadow: 0 3px 14px rgba(217,63,122,.35);
}
.btn-nav.next:hover {
  background: var(--rose-dk);
  transform: translateY(-1px);
  box-shadow: 0 5px 18px rgba(217,63,122,.45);
}
.btn-nav.next:disabled {
  background: var(--border);
  color: #aaa;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
.btn-invisible { visibility: hidden; }

/* ─── Completion badge ────────────────────────────────────────── */
.completion-badge {
  background: linear-gradient(135deg, var(--green), #2d8a55);
  color: white;
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  text-align: center;
  font-weight: 600;
  font-size: 1rem;
  margin: 1.5rem 0;
  box-shadow: 0 4px 16px rgba(76,175,122,.3);
}

/* ─── Welcome checklist ───────────────────────────────────────── */
.module-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .6rem;
  margin: 1.2rem 0;
}
.module-pill {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .6rem .9rem;
  font-size: .85rem;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: .5rem;
  font-weight: 300;
}
.module-pill span { color: var(--rose); font-size: .75rem; }

/* ─── Overlay (mobile) ────────────────────────────────────────── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,16,24,.4);
  z-index: 89;
  backdrop-filter: blur(2px);
}

/* ─── Responsive ──────────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 260px; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: var(--shadow-lg);
  }
  .sidebar-overlay.show { display: block; }
  .sidebar-toggle { display: flex; }
  .content-area {
    margin-left: 0;
    padding: 1.5rem 1rem 3rem;
  }
  .mod-header h2 { font-size: 1.7rem; }
  .progress-track { width: 90px; }
  .module-list { grid-template-columns: 1fr; }
  .header-title small { display: none; }
}
</style>
</head>
<body>

<!-- ═══ LOGIN ════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <span class="login-flower">🌸</span>
    <h1>Sana Tu Mundo Interior</h1>
    <div class="login-divider"></div>
    <p>Tu viaje de transformación comienza aquí.<br>Ingresa tu código de acceso para continuar.</p>
    <input type="text" id="accessCode" placeholder="Código de acceso" autocomplete="off"
           onkeydown="if(event.key==='Enter') checkAccess()">
    <button class="btn-primary" onclick="checkAccess()">Comenzar el Viaje ✦</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ═══ APP ══════════════════════════════════════════════════════ -->
<div id="appContainer">

  <!-- Header -->
  <header class="app-header">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="header-brand">
      <div class="header-logo">🌸</div>
      <div class="header-title">
        Sana Tu Mundo Interior
        <small>Viaje de Transformación</small>
      </div>
    </div>
    <div class="header-progress">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progressLabel">0 / 11</span>
    </div>
  </header>

  <div class="app-body">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar"></nav>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Main content -->
    <main class="content-area" id="contentArea"></main>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   DATA
════════════════════════════════════════════════════════════════ */
const modules = [
  {
    id: 0,
    label: 'Bienvenida',
    title: 'Tu Viaje de Transformación',
    content: () => `
      <p>Has tomado una decisión valiente: embarcarte en el viaje más importante de tu vida, el viaje hacia tu interior. Este no es un camino fácil, pero es el único que realmente transforma.</p>
      <p>Durante este proceso vas a descubrir partes de ti que quizás habías olvidado o nunca conociste. Vas a enfrentar sombras, quitarte máscaras y sanar heridas profundas. Pero también vas a encontrar tu luz, tu autenticidad, tu poder interior.</p>

      <div class="quote-box">
        <p>"El viaje más largo es el viaje hacia adentro." — Dag Hammarskjöld</p>
      </div>

      <h3>¿Cómo funciona este proceso?</h3>
      <p>Este viaje está dividido en 10 módulos. Cada uno representa una etapa esencial de tu transformación:</p>

      <div class="module-list">
        <div class="module-pill"><span>✦</span> El Socavón</div>
        <div class="module-pill"><span>✦</span> Las Máscaras</div>
        <div class="module-pill"><span>✦</span> La Sombra</div>
        <div class="module-pill"><span>✦</span> El Niño Interior</div>
        <div class="module-pill"><span>✦</span> Creencias Limitantes</div>
        <div class="module-pill"><span>✦</span> Las Heridas</div>
        <div class="module-pill"><span>✦</span> El Perdón</div>
        <div class="module-pill"><span>✦</span> La Gratitud</div>
        <div class="module-pill"><span>✦</span> Tu Nueva Yo</div>
        <div class="module-pill"><span>✦</span> El Plan de Acción</div>
      </div>

      <h3>Antes de empezar</h3>
      <p>Este proceso requiere honestidad radical contigo misma. No hay respuestas correctas o incorrectas. Solo hay <em>tu</em> verdad.</p>
      <p>Cada módulo incluye ejercicios prácticos. Tómate el tiempo que necesites para completarlos con profundidad. La transformación real sucede en el trabajo interno, no en la lectura superficial.</p>

      <div class="exercise-box">
        <h4><span class="ex-num">✍</span> Compromiso Inicial</h4>
        <p>Antes de comenzar, escribe tu compromiso contigo misma. ¿Por qué estás aquí? ¿Qué esperas lograr con este viaje?</p>
        <textarea data-exercise="welcome-commitment" placeholder="Mi compromiso es..."></textarea>
        <div class="exercise-hint">💡 Sé específica. Este compromiso será tu ancla cuando el proceso se ponga difícil.</div>
      </div>
    `
  },
  {
    id: 1,
    label: 'Módulo 1',
    title: 'El Socavón',
    content: () => `
      <h3>Reconociendo Tu Crisis</h3>
      <p>Hay momentos en la vida en que el suelo se abre bajo nuestros pies. De repente, todo lo que creíamos sólido se desmorona. La relación que pensábamos eterna termina. El trabajo que definía nuestra identidad desaparece. La salud que dábamos por sentada nos falla.</p>
      <p>Esto es el socavón: ese momento de crisis profunda donde todo lo conocido se derrumba y nos encontramos caídas en la oscuridad, sin saber cómo salir.</p>

      <div class="story-box">
        <div class="story-label">✦ Historia real</div>
        <h4>La historia de Camila</h4>

/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
let currentModule = 0;
let completedModules = new Set();
let answers = {};

/* ════════════════════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════════════════════ */
function checkAccess() {
  const code = document.getElementById('accessCode').value.trim();
  if (code === 'STM2024') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    loadState();
    renderSidebar();
    // Go to last unfinished or first module
    const firstUnfinished = modules.findIndex((_, i) => !completedModules.has(i));
    showModule(firstUnfinished >= 0 ? firstUnfinished : 0);
  } else {
    const err = document.getElementById('loginError');
    err.textContent = 'Código incorrecto. Inténtalo de nuevo.';
    setTimeout(() => { err.textContent = ''; }, 3000);
    document.getElementById('accessCode').style.borderColor = '#c0392b';
    setTimeout(() => { document.getElementById('accessCode').style.borderColor = ''; }, 1500);
  }
}

/* ════════════════════════════════════════════════════════════════
   STATE PERSISTENCE
════════════════════════════════════════════════════════════════ */
function saveState() {
  try {
    localStorage.setItem('stm_answers', JSON.stringify(answers));
    localStorage.setItem('stm_completed', JSON.stringify([...completedModules]));
  } catch(e) {}
}

function loadState() {
  try {
    const a = localStorage.getItem('stm_answers');
    if (a) answers = JSON.parse(a);
    const c = localStorage.getItem('stm_completed');
    if (c) completedModules = new Set(JSON.parse(c));
  } catch(e) {}
}

/* ════════════════════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════════════════════ */
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = modules.map((mod, i) => {
    const done = completedModules.has(i);
    const active = i === currentModule;
    let cls = 'nav-item';
    if (active) cls += ' active';
    if (done)   cls += ' completed';
    const dotContent = done ? '✓' : (i === 0 ? '★' : i);
    return `<div class="${cls}" onclick="showModule(${i}); closeSidebar();">
      <span class="nav-dot">${dotContent}</span>
      <span>${mod.label === 'Bienvenida' ? mod.label : mod.label + ': ' + mod.title.split(' ').slice(0,2).join(' ')}</span>
    </div>`;
  }).join('');
  updateProgress();
}

function updateProgress() {
  const done = completedModules.size;
  const total = modules.length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total;
}

/* ════════════════════════════════════════════════════════════════
   MODULE RENDERING
════════════════════════════════════════════════════════════════ */
function showModule(index) {
  currentModule = index;
  const mod = modules[index];
  const area = document.getElementById('contentArea');

  const isFirst = index === 0;
  const isLast  = index === modules.length - 1;

  area.innerHTML = `
    <div class="mod-header">
      <span class="mod-label">${mod.label}</span>
      <h2>${mod.title}</h2>
      <div class="mod-header-line"></div>
    </div>
    <div class="mod-body">
      ${mod.content()}
      <div class="nav-buttons">
        <button class="btn-nav prev ${isFirst ? 'btn-invisible' : ''}" onclick="prevModule()">← Anterior</button>
        <button class="btn-nav next" id="nextBtn" onclick="nextModule()" disabled>
          ${isLast ? '✅ Completar viaje' : 'Completar y continuar →'}
        </button>
      </div>
    </div>
  `;

  renderSidebar();
  loadModuleAnswers(index);
  setupListeners();
  area.scrollTop = 0;
}

/* ════════════════════════════════════════════════════════════════
   EXERCISES
════════════════════════════════════════════════════════════════ */
function setupListeners() {
  const textareas = document.querySelectorAll('textarea[data-exercise]');
  const btn = document.getElementById('nextBtn');

  const checkReady = () => {
    const hasAny = [...textareas].some(t => t.value.trim().length >= 5);
    btn.disabled = !hasAny;
  };

  textareas.forEach(t => {
    t.addEventListener('input', () => {
      saveAnswer(t.dataset.exercise, t.value);
      checkReady();
    });
  });

  checkReady();
}

function saveAnswer(key, val) {
  if (!answers[currentModule]) answers[currentModule] = {};
  answers[currentModule][key] = val;
  saveState();
}

function loadModuleAnswers(idx) {
  if (!answers[idx]) return;
  Object.entries(answers[idx]).forEach(([key, val]) => {
    const el = document.querySelector(`textarea[data-exercise="${key}"]`);
    if (el) el.value = val;
  });
  // Re-check button after loading
  const btn = document.getElementById('nextBtn');
  const textareas = document.querySelectorAll('textarea[data-exercise]');
  const hasAny = [...textareas].some(t => t.value.trim().length >= 5);
  if (btn) btn.disabled = !hasAny;
}

/* ════════════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════════════ */
function nextModule() {
  completedModules.add(currentModule);
  saveState();
  if (currentModule < modules.length - 1) {
    showModule(currentModule + 1);
  } else {
    showFinalScreen();
  }
}

function prevModule() {
  if (currentModule > 0) showModule(currentModule - 1);
}

function showFinalScreen() {
  updateProgress();
  renderSidebar();
  document.getElementById('contentArea').innerHTML = `
    <div style="text-align:center; padding: 4rem 2rem; animation: fadeUp .5s ease;">
      <div style="font-size:3.5rem; margin-bottom:1.5rem;">🌸</div>

        ¡Lo lograste!
      </h2>
      <div style="width:60px;height:3px;background:var(--rose);border-radius:2px;margin:1rem auto 1.5rem;"></div>
      <p style="color:var(--ink-2);font-weight:300;line-height:1.9;max-width:500px;margin:0 auto 2rem;font-size:1.05rem;">
        Has completado los 10 módulos de tu viaje de transformación. Este no es un final, es el comienzo de vivir desde quien realmente eres.
      </p>
      <p style="color:var(--ink-3);font-weight:300;font-style:italic;font-size:.95rem;">
        Recuerda: la transformación real sucede en cómo vives cada día de ahora en adelante.
      </p>
      <div style="margin-top:2.5rem;">
        <button class="btn-primary" style="width:auto;display:inline-flex;" onclick="showModule(0)">
          Volver al inicio
        </button>
      </div>
    </div>
  `;
}

   SIDEBAR TOGGLE (mobile)
════════════════════════════════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}
</script>
